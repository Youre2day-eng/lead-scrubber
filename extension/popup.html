<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>LeadScrubber</title>
  <style>
    body { font: 13px -apple-system, system-ui, sans-serif; margin: 0; padding: 12px; width: 320px; }
    h1 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }
    label { display: block; margin-top: 10px; font-weight: 600; color: #333; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
    textarea { height: 70px; resize: vertical; }
    .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    button { background: #2563eb; color: #fff; border: 0; border-radius: 4px; padding: 7px 12px; font: inherit; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .muted { color: #666; font-size: 11px; margin-top: 8px; line-height: 1.4; }
    .status { margin-top: 10px; font-size: 12px; color: #16a34a; }
  </style>
</head>
<body>
  <h1>🎯 LeadScrubber</h1>
  <label><input type="checkbox" id="enabled"> Enabled on FB Group pages</label>
  <label>Keywords (comma or newline separated)</label>
  <textarea id="keywords" placeholder="plumber, leak, water heater, ISO"></textarea>
  <label>Dashboard URL</label>
  <input id="dashboardUrl" placeholder="https://lead-scrubber.pages.dev">
  <label>Ingest Token (optional)</label>
  <input id="token" placeholder="if you set INGEST_TOKEN secret">
  <div class="row"><button id="save">Save</button><span id="status" class="status"></span></div>
  <p class="muted">Open FB Groups you've joined and scroll normally. Matching posts are sent to your dashboard.</p>
  <script src="popup.js"></script>
</body>
</html>
